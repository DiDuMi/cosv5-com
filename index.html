<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" data-i18n="hero.subtitle" content="汇聚精选资源，社群成员专属。每周更新最新流出与高级精选内容。">
  <meta name="keywords" content="COSV5,社群资源,精选内容,资源分享,近期流出,高级精选">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="COSV5 社群资源站">
  <meta property="og:description" data-i18n="hero.subtitle" content="汇聚精选资源，社群成员专属。每周更新最新流出与高级精选内容。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cosv5.com">
  <link rel="canonical" href="https://cosv5.com">
  <title data-i18n="hero.title">COSV5 社群资源站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <!-- Header -->
  <header class="header">
    <nav class="nav">
      <a href="/" class="nav-logo">
        <span class="logo-icon">C</span>
        <span>COSV5</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="/" class="active" data-i18n="nav.home">首页</a></li>
        <li><a href="/releases/" data-i18n="nav.releases">近期流出</a></li>
        <li><a href="/premium/" data-i18n="nav.premium">高级精选</a></li>
        <li><a href="/about/" data-i18n="nav.about">关于</a></li>
      </ul>
      <div class="nav-right">
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()" data-i18n="lang.switch">English</button>
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>
      </div>
    </nav>
  </header>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="container">
        <h1 data-i18n="hero.title">COSV5 社群资源站</h1>
        <p data-i18n="hero.subtitle">汇聚精选资源，社群成员专属。每周更新最新流出与高级精选内容。</p>
        <div class="hero-actions">
          <a href="/releases/" class="btn btn-primary" data-i18n="hero.cta.releases">浏览近期流出</a>
          <a href="/premium/" class="btn btn-gold" data-i18n="hero.cta.premium">查看高级精选</a>
        </div>
      </div>
    </section>

    <!-- Releases Section -->
    <section class="section">
      <div class="container">
        <div class="section-header">
          <div>
            <h2 class="section-title">
              <span data-i18n="section.releases.title">近期流出</span>
              <span class="badge badge-releases" data-i18n="section.releases.new">更新</span>
            </h2>
            <span class="section-count"><span data-i18n-dynamic></span></span>
          </div>
          <a href="/releases/" class="view-more" data-i18n="section.releases.view_all">查看全部流出</a>
        </div>
        <div class="card-grid" id="releases-grid"></div>
        <div class="empty-state" style="display:none">
          <div class="empty-icon">📭</div>
          <h3 data-i18n="section.releases.empty">暂无近期流出内容</h3>
        </div>
        <div class="show-more-wrapper" style="display:none">
          <button class="btn-show-more"></button>
        </div>
      </div>
    </section>

    <!-- Premium Section -->
    <section class="section">
      <div class="container">
        <div class="section-header">
          <div>
            <h2 class="section-title">
              <span data-i18n="section.premium.title">高级精选</span>
              <span class="badge badge-premium" data-i18n="section.premium.new">VIP</span>
            </h2>
            <span class="section-count"><span data-i18n-dynamic></span></span>
          </div>
          <a href="/premium/" class="view-more" data-i18n="section.premium.view_all">查看全部精选</a>
        </div>
        <div class="card-grid" id="premium-grid"></div>
        <div class="empty-state" style="display:none">
          <div class="empty-icon">⭐</div>
          <h3 data-i18n="section.premium.empty">暂无高级精选内容</h3>
        </div>
        <div class="show-more-wrapper" style="display:none">
          <button class="btn-show-more"></button>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p data-i18n="footer.text">© 2026 COSV5. 本站内容仅供社群内部参考。</p>
      <p><span data-i18n="footer.powered">Powered by COSV5 Community</span></p>
    </div>
  </footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadSection('releases-grid', '/data/releases.json', false);
      loadSection('premium-grid', '/data/premium.json', true);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" data-i18n="page.about.content" content="COSV5 是专注于高品质资源分享的社群，汇聚全球精选内容。">
  <meta name="keywords" content="COSV5,关于,社群,资源分享">
  <meta name="robots" content="index, follow">
  <meta property="og:title" data-i18n="page.about.title" content="关于 — COSV5 社群资源站">
  <meta property="og:description" data-i18n="page.about.content" content="COSV5 是专注于高品质资源分享的社群，汇聚全球精选内容。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cosv5.com/about/">
  <link rel="canonical" href="https://cosv5.com/about/">
  <title data-i18n="page.about.title">关于 — COSV5 社群资源站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .about-content { max-width: 700px; margin: 0 auto; }
    .about-content p { margin-bottom: 1.2rem; color: var(--text-secondary); line-height: 1.8; }
    .about-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
    .about-feature { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; text-align: center; }
    .about-feature .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .about-feature h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .about-feature p { font-size: 0.85rem; color: var(--text-secondary); }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <header class="header">
    <nav class="nav">
      <a href="/" class="nav-logo">
        <span class="logo-icon">C</span>
        <span>COSV5</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="/" data-i18n="nav.home">首页</a></li>
        <li><a href="/releases/" data-i18n="nav.releases">近期流出</a></li>
        <li><a href="/premium/" data-i18n="nav.premium">高级精选</a></li>
        <li><a href="/about/" class="active" data-i18n="nav.about">关于</a></li>
      </ul>
      <div class="nav-right">
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">English</button>
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1 data-i18n="page.about.heading">关于 COSV5</h1>
      </div>
    </section>

    <section class="section" style="padding-top:0">
      <div class="container about-content">
        <p data-i18n="page.about.content">COSV5 是专注于高品质资源分享的社群，汇聚全球精选内容。我们持续为社群成员提供最新的流出资源和高级精选内容。</p>

        <div class="about-features">
          <div class="about-feature">
            <div class="icon">📡</div>
            <h3 data-i18n="section.releases.title">近期流出</h3>
            <p data-i18n="section.releases.desc">社群成员分享的最新资源流出，持续更新中。</p>
          </div>
          <div class="about-feature">
            <div class="icon">⭐</div>
            <h3 data-i18n="section.premium.title">高级精选</h3>
            <p data-i18n="section.premium.desc">高级会员专享的精选资源，品质保证。</p>
          </div>
          <div class="about-feature">
            <div class="icon">🌐</div>
            <h3>Telegram</h3>
            <p>加入 <a href="https://t.me/COSV5_COM" target="_blank" rel="noopener">@COSV5_COM</a> 和 <a href="https://t.me/COSV5_VIP" target="_blank" rel="noopener">@COSV5_VIP</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p data-i18n="footer.text">© 2026 COSV5. 本站内容仅供社群内部参考。</p>
      <p><span data-i18n="footer.powered">Powered by COSV5 Community</span></p>
    </div>
  </footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>

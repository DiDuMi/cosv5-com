<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" data-i18n="section.premium.desc" content="高级会员专享的精选资源，品质保证。">
  <meta name="keywords" content="COSV5,高级精选,VIP资源,精品资源">
  <meta name="robots" content="index, follow">
  <meta property="og:title" data-i18n="page.premium.title" content="高级精选 — COSV5 社群资源站">
  <meta property="og:description" data-i18n="section.premium.desc" content="高级会员专享的精选资源，品质保证。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cosv5.com/premium/">
  <link rel="canonical" href="https://cosv5.com/premium/">
  <title data-i18n="page.premium.title">高级精选 — COSV5 社群资源站</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <header class="header">
    <nav class="nav">
      <a href="/" class="nav-logo">COSV5</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="/" data-i18n="nav.home">首页</a></li>
        <li><a href="/releases/" data-i18n="nav.releases">近期流出</a></li>
        <li><a href="/premium/" class="active" data-i18n="nav.premium">高级精选</a></li>
        <li><a href="/about/" data-i18n="nav.about">关于</a></li>
      </ul>
      <div class="nav-right">
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()" data-i18n="lang.switch">English</button>
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1 data-i18n="page.premium.heading">高级精选资源</h1>
        <p data-i18n="section.premium.desc">高级会员专享的精选资源，品质保证。</p>
      </div>
    </section>

    <section class="section" style="padding-top:0">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">⭐ <span data-i18n="section.premium.title">高级精选</span></h2>
          <span class="section-meta"><span data-i18n-dynamic></span></span>
        </div>
        <ul class="resource-list" id="premium-list"></ul>
        <div class="empty-state" style="display:none">
          <p data-i18n="section.premium.empty">暂无高级精选内容</p>
        </div>
        <div class="show-more-wrapper" style="display:none">
          <button class="btn-show-more"></button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p data-i18n="footer.text">© 2026 COSV5. 本站内容仅供社群内部参考。</p>
      <p><span data-i18n="footer.powered">Powered by COSV5 Community</span></p>
    </div>
  </footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadSection('premium-list', '/data/premium.json', true);
    });
  </script>
</body>
</html>

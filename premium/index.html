<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" data-i18n="section.premium.desc" content="高级会员专享的精选资源，品质保证。">
  <meta name="keywords" content="COSV5,高级精选,VIP资源,精品资源">
  <meta name="robots" content="index, follow">
  <meta property="og:title" data-i18n="page.premium.title" content="高级精选 — COSV5">
  <meta property="og:description" data-i18n="section.premium.desc" content="高级会员专享的精选资源，品质保证。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cosv5.com/premium/">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="canonical" href="https://cosv5.com/premium/">
  <title data-i18n="page.premium.title">高级精选 — COSV5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&family=Righteous&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="progress-bar" id="progress-bar"></div>
  <canvas id="particles-canvas"></canvas>

  <header class="header" id="header">
    <nav class="nav">
      <a href="/" class="nav-logo">COSV5</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="/" data-i18n="nav.home">首页</a></li>
        <li><a href="/releases/" data-i18n="nav.releases">流出</a></li>
        <li><a href="/premium/" class="active" data-i18n="nav.premium">精选</a></li>
        <li><a href="/about/" data-i18n="nav.about">关于</a></li>
      </ul>
      <div class="nav-right">
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()" data-i18n="lang.switch">English</button>
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1 data-i18n="page.premium.heading">高级精选</h1>
        <p data-i18n="section.premium.desc">高级会员专享的精选资源，品质保证。</p>
      </div>
    </section>

    <section class="section reveal" style="padding-top:0">
      <div class="section-bg-glow right"></div>
      <div class="container">
        <div class="section-header">
          <div>
            <span class="section-label" data-i18n="section.premium.new">VIP 精选</span>
            <h2 class="section-title" data-i18n="section.premium.title">⭐ 高级精选</h2>
          </div>
          <span class="section-meta"><span data-i18n-dynamic></span></span>
        </div>
        <ul class="resource-grid" id="premium-list"></ul>
        <div class="empty-state" style="display:none"><p data-i18n="section.premium.empty">暂无高级精选内容</p></div>
        <div class="show-more-wrapper" style="display:none"><button class="btn-show-more"></button></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-logo">COSV5</div>
        <div class="footer-links">
          <a href="/">首页</a>
          <a href="/releases/">流出</a>
          <a href="/premium/">精选</a>
          <a href="/about/">关于</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p data-i18n="footer.text">© 2026 COSV5. 本站内容仅供社群内部参考。</p>
        <p><span data-i18n="footer.powered">Powered by COSV5 Community</span></p>
      </div>
    </div>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>

  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadSection('premium-list', '/data/premium.json', true);
    });
  </script>
</body>
</html>
